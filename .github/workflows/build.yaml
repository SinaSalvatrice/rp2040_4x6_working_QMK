name: Build Silent_display_3x3firmware

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # QMK uses a bunch of system packages; this covers the common basics
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            gcc \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi \
            avr-libc \
            dfu-programmer \
            dfu-util \
            teensy-loader-cli \
            python3-pip \
            unzip \
            wget \
            zip
      
      - name: Cache Python packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      
      - name: Install QMK CLI
        run: |
          python -m pip install --upgrade pip
          pip install qmk

      - name: Setup QMK firmware
        run: |
          qmk setup -H ~/qmk_firmware -y || true
          sudo cp ~/qmk_firmware/util/udev/50-qmk.rules /etc/udev/rules.d/ 2>/dev/null || true
          sudo udevadm control --reload-rules 2>/dev/null || true
          mkdir -p ~/qmk_firmware/keyboards/Silent_display_3x3
          cp -r $GITHUB_WORKSPACE/* ~/qmk_firmware/keyboards/Silent_display_3x3/

      # This compiles using the QMK CLI.
      - name: Compile firmware
        env:
          KEYBOARD: "Silent_display_3x3"
          KEYMAP: "sina"
        run: |
          qmk compile -kb "$KEYBOARD" -km "$KEYMAP"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: Silent_display_3x3_firmware
          path: |
            ~/qmk_firmware/*.uf2
            ~/qmk_firmware/*.hex
            ~/qmk_firmware/*.bin
